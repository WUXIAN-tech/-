name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk-headless autoconf libtool pkg-config \
          libltdl-dev libffi-dev python3-dev unzip zip

    - name: Install Python build tools
      run: pip install buildozer cython

    - name: Cache Android NDK
      id: cache-ndk
      uses: actions/cache@v4
      with:
        path: /tmp/ndk/android-ndk-r23c
        key: ndk-r23c-v2

    - name: Download Android NDK
      if: steps.cache-ndk.outputs.cache-hit != 'true'
      run: |
        mkdir -p /tmp/ndk
        cd /tmp/ndk
        wget -q "https://dl.google.com/android/repository/android-ndk-r23c-linux.zip"
        unzip -q android-ndk-r23c-linux.zip
        echo "NDK extracted to /tmp/ndk"

    - name: Set NDK path
      run: echo "NDK_HOME=/tmp/ndk/android-ndk-r23c" >> $GITHUB_ENV

    - name: Build LAME for Android (arm64)
      run: |
        NDK="${{ env.NDK_HOME }}"
        TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"

        # Build LAME for arm64-v8a
        wget -q https://sourceforge.net/projects/lame/files/lame/3.100/lame-3.100.tar.gz -O lame.tar.gz
        tar xzf lame.tar.gz
        cd lame-3.100

        export CC="${TOOLCHAIN}/bin/aarch64-linux-android21-clang"
        export AR="${TOOLCHAIN}/bin/llvm-ar"
        export RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
        export STRIP="${TOOLCHAIN}/bin/llvm-strip"

        ./configure --host=aarch64-linux-android --prefix=$(pwd)/../lame-arm64 --enable-static --disable-shared --with-pic
        make -j$(nproc) && make install
        cd ..

    - name: Build FFmpeg for Android (arm64)
      run: |
        NDK="${{ env.NDK_HOME }}"
        TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"

        wget -q https://ffmpeg.org/releases/ffmpeg-6.1.tar.xz -O ffmpeg.tar.xz
        tar xf ffmpeg.tar.xz
        cd ffmpeg-6.1

        export CC="${TOOLCHAIN}/bin/aarch64-linux-android21-clang"
        export CXX="${TOOLCHAIN}/bin/aarch64-linux-android21-clang++"
        export AR="${TOOLCHAIN}/bin/llvm-ar"
        export RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
        export STRIP="${TOOLCHAIN}/bin/llvm-strip"

        ./configure \
          --enable-cross-compile \
          --cross-prefix=${TOOLCHAIN}/bin/aarch64-linux-android- \
          --target-os=android \
          --arch=aarch64 \
          --cpu=armv8-a \
          --cc="${CC}" \
          --cxx="${CXX}" \
          --ar="${AR}" \
          --ranlib="${RANLIB}" \
          --strip="${STRIP}" \
          --pkg-config=pkg-config \
          --enable-static \
          --disable-shared \
          --enable-small \
          --disable-doc \
          --disable-ffplay \
          --disable-ffprobe \
          --disable-avdevice \
          --disable-postproc \
          --disable-network \
          --enable-libmp3lame \
          --enable-gpl \
          --extra-cflags="-I$(pwd)/../lame-arm64/include" \
          --extra-ldflags="-L$(pwd)/../lame-arm64/lib"

        make -j$(nproc)
        mkdir -p ../ffmpeg/arm64-v8a
        cp ffmpeg ../ffmpeg/arm64-v8a/ffmpeg
        ${TOOLCHAIN}/bin/llvm-strip ../ffmpeg/arm64-v8a/ffmpeg
        cd ..

    - name: Verify FFmpeg binary
      run: |
        echo "=== ARM64 binary ==="
        file ffmpeg/arm64-v8a/ffmpeg
        ls -lh ffmpeg/arm64-v8a/ffmpeg

    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: .buildozer/android/platform
        key: buildozer-platform-v1-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-platform-v1-

    - name: Build APK with Buildozer
      run: |
        set -o pipefail
        export BUILDOZER_WSL_ON_HEADLESS=1
        buildozer android debug 2>&1 | tee build.log
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: MP4转MP3-APK
        path: |
          bin/*.apk
          .buildozer/**/*.apk
          *.apk
        if-no-files-found: warn
        retention-days: 90

    - name: Upload build log (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
